<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us - BrightHaven Children's Services</title>
  <style>
    :root {
      --navy: #173a57;
      --gold: #d7a23d;
      --bg: #f4f4f4;
      --text: #1f2937;
      --muted: #5f6b7a;
      --card: #ffffff;
      --soft: #f6f8fa;
      --line: rgba(23,58,87,0.08);
      --radius: 28px;
      --max: 1180px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.6;
    }

    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    .container {
      width: min(var(--max), calc(100% - 32px));
      margin: 0 auto;
    }

    .topbar {
      background: var(--navy);
      color: #fff;
      font-size: 14px;
    }

    .topbar .container {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      padding: 12px 0;
      flex-wrap: wrap;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.92);
      border-bottom: 1px solid var(--line);
    }

    .header .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
      padding: 14px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand img { height: 60px; width: auto; }

    .brand-copy h1 {
      margin: 0;
      color: var(--navy);
      font-size: 28px;
      line-height: 1;
    }

    .brand-copy p {
      margin: 6px 0 0;
      color: var(--gold);
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }

    nav a {
      color: #334155;
      font-size: 14px;
      font-weight: 600;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 14px 22px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: transform .2s ease, opacity .2s ease, background .2s ease;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn-primary { background: var(--navy); color: #fff; }
    .btn-accent { background: var(--gold); color: var(--navy); }
    .btn-outline { background: #fff; color: var(--navy); border: 1px solid rgba(23,58,87,.16); }

    section { padding: 86px 0; }

    .section-heading {
      margin: 0 0 14px;
      color: var(--navy);
      font-size: clamp(30px, 4vw, 46px);
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .section-label {
      margin: 0 0 10px;
      color: var(--gold);
      font-weight: 800;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.28em;
    }

    .section-copy {
      margin: 0;
      color: var(--muted);
      font-size: 17px;
      max-width: 720px;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 44px;
      margin-top: 48px;
      align-items: start;
    }
