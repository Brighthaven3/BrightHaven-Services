<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrightHaven Children's Services</title>
  <meta name="description" content="BrightHaven Children's Services provides safe, nurturing, and child-centred residential care." />
  <style>
    :root {
      --navy: #173a57;
      --gold: #d7a23d;
      --bg: #f4f4f4;
      --text: #1f2937;
      --muted: #5f6b7a;
      --card: #ffffff;
      --soft: #f6f8fa;
      --line: rgba(23,58,87,0.08);
      --shadow: 0 20px 60px rgba(23,58,87,0.10);
      --radius: 28px;
      --max: 1180px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.6;
    }

    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    .container {
      width: min(var(--max), calc(100% - 32px));
      margin: 0 auto;
    }

    .topbar {
      background: var(--navy);
      color: #fff;
      font-size: 14px;
    }

    .topbar .container {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      padding: 12px 0;
      flex-wrap: wrap;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.92);
      border-bottom: 1px solid var(--line);
    }

    .header .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
      padding: 14px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand img { height: 60px; width: auto; }

    .brand-copy h1 {
      margin: 0;
      color: var(--navy);
      font-size: 28px;
      line-height: 1;
    }

    .brand-copy p {
      margin: 6px 0 0;
      color: var(--gold);
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }

    nav a {
      color: #334155;
      font-size: 14px;
      font-weight: 600;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 14px 22px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: transform .2s ease, opacity .2s ease, background .2s ease;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn-primary { background: var(--navy); color: #fff; }
    .btn-accent { background: var(--gold); color: var(--navy); }
    .btn-outline { background: #fff; color: var(--navy); border: 1px solid rgba(23,58,87,.16); }

    .hero {
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #ffffff 0%, #f8f6f1 45%, #eef2f5 100%);
      padding: 70px 0 80px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.08fr 0.92fr;
      gap: 44px;
      align-items: center;
    }

    .eyebrow {
      display: inline-block;
      background: rgba(215,162,61,.10);
      border: 1px solid rgba(215,162,61,.30);
      color: var(--navy);
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 18px;
    }

    .hero h2 {
      margin: 0;
      color: var(--navy);
      font-size: clamp(38px, 6vw, 64px);
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .hero p.lead {
      margin: 22px 0 0;
      max-width: 670px;
      font-size: 18px;
      color: var(--muted);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 28px;
    }

    .hero-media {
      position: relative;
      background: #fff;
      border-radius: 32px;
      padding: 18px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,.8);
    }

    .hero-media img {
      width: 100%;
      height: 520px;
      object-fit: cover;
      border-radius: 24px;
    }

    .hero-badge {
      position: absolute;
      left: 32px;
      bottom: 32px;
      background: rgba(255,255,255,.88);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.5);
      border-radius: 24px;
      padding: 20px 22px;
      max-width: 360px;
      box-shadow: 0 12px 30px rgba(0,0,0,.10);
    }

    .hero-badge strong {
      display: block;
      color: var(--navy);
      font-size: 18px;
      margin-bottom: 6px;
    }
